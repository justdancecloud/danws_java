name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --yes --import
          gpg --list-secret-keys --keyid-format=long
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print substr($5, length($5)-7); exit}')
          echo "GPG_KEY_NAME=$KEY_ID" >> $GITHUB_ENV
          echo "Using GPG key: $KEY_ID"

      - name: Build and test
        run: ./gradlew test --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Publish to local repo (signed artifacts)
        run: ./gradlew publishMavenJavaPublicationToLocalRepository --no-daemon
        env:
          ORG_GRADLE_PROJECT_signing_gnupg_executable: gpg
          GPG_KEY_NAME: ${{ env.GPG_KEY_NAME }}

      - name: Prune non-Central files from repo
        run: |
          cd build/repo/io/github/justdancecloud/dan-websocket
          rm -f maven-metadata.xml*
          cd ${{ steps.ver.outputs.version }}
          rm -f *.sha256 *.sha512 *.module*
          ls -la

      - name: Create Central Portal bundle
        run: python mkbundle.py

      - name: Upload bundle to Maven Central Portal
        id: central
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC" \
            -u "${{ secrets.SONATYPE_USERNAME }}:${{ secrets.SONATYPE_PASSWORD }}" \
            -F "bundle=@build/bundle.zip")
          HTTP=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP: $HTTP"
          echo "Deployment ID: $BODY"
          if [ "$HTTP" != "201" ]; then
            echo "::error::Central Portal upload failed"
            exit 1
          fi
          echo "deployment_id=$BODY" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Packages
        run: ./gradlew publishMavenJavaPublicationToGitHubPackagesRepository --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_KEY_NAME: ${{ env.GPG_KEY_NAME }}

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/repo/io/github/justdancecloud/dan-websocket/${{ steps.ver.outputs.version }}/dan-websocket-${{ steps.ver.outputs.version }}.jar
            build/repo/io/github/justdancecloud/dan-websocket/${{ steps.ver.outputs.version }}/dan-websocket-${{ steps.ver.outputs.version }}.jar.asc
            build/repo/io/github/justdancecloud/dan-websocket/${{ steps.ver.outputs.version }}/dan-websocket-${{ steps.ver.outputs.version }}-sources.jar
            build/repo/io/github/justdancecloud/dan-websocket/${{ steps.ver.outputs.version }}/dan-websocket-${{ steps.ver.outputs.version }}-sources.jar.asc
            build/repo/io/github/justdancecloud/dan-websocket/${{ steps.ver.outputs.version }}/dan-websocket-${{ steps.ver.outputs.version }}-javadoc.jar
            build/repo/io/github/justdancecloud/dan-websocket/${{ steps.ver.outputs.version }}/dan-websocket-${{ steps.ver.outputs.version }}-javadoc.jar.asc
            build/repo/io/github/justdancecloud/dan-websocket/${{ steps.ver.outputs.version }}/dan-websocket-${{ steps.ver.outputs.version }}.pom
            build/repo/io/github/justdancecloud/dan-websocket/${{ steps.ver.outputs.version }}/dan-websocket-${{ steps.ver.outputs.version }}.pom.asc
